<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" shape-rendering="crispedges">
  <!-- Piel base -->
  <rect width="8" height="8" fill="#AF7E63"/>
  
  <!-- Pelo y Barba (Marrones) -->
  <rect width="8" height="2" fill="#5A3A23"/> <!-- Pelo arriba -->
  <rect y="2" width="1" height="1" fill="#5A3A23"/> <!-- Pelo lateral izq -->
  <rect x="7" y="2" width="1" height="1" fill="#5A3A23"/> <!-- Pelo lateral der -->
  <rect x="1" y="7" width="6" height="1" fill="#5A3A23"/> <!-- Barba base -->
  <rect x="2" y="6" width="4" height="1" fill="#5A3A23"/> <!-- Barba centro -->
  
  <!-- Ojos -->
  <!-- Ojo izquierdo: Blanco y Pupilas (Azul/Violeta) -->
  <rect x="1" y="4" width="1" height="1" fill="#FFF"/>
  <rect x="2" y="4" width="1" height="1" fill="#5F5FA0"/>
  <!-- Ojo derecho: Pupilas (Azul/Violeta) y Blanco -->
  <rect x="5" y="4" width="1" height="1" fill="#5F5FA0"/>
  <rect x="6" y="4" width="1" height="1" fill="#FFF"/>
  
  <!-- Nariz/Boca -->
  <rect x="3" y="5" width="2" height="1" fill="#935A41"/> <!-- Nariz -->
  <rect x="3" y="6" width="2" height="1" fill="#A1694F"/> <!-- Labio superior -->
</svg>
